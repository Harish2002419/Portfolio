<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Information</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Other content -->

    <!-- Contact Section -->
    <div class="contact-info">
        <p><a href="#" id="contact-link">Contact Us</a></p>
        <p id="contact-number" style="display:none;">+94766424646 <br> +947548994599</p>
    </div>

    <script>
        document.getElementById("contact-link").addEventListener("click", function(event) {
            event.preventDefault(); // Prevent default link behavior
            var contactNumber = document.getElementById("contact-number");
            if (contactNumber.style.display === "none") {
                contactNumber.style.display = "block";
            } else {
                contactNumber.style.display = "none";
            }
        });
    </script>
</body>
</html>
