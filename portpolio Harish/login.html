<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="login-modal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h2>Login</h2>
            <form action="your_login_handler.php" method="POST">
                <div class="input-group">
                    <label for="username">Username:</label>
                    <input type="text" id="username" name="username" required>
                </div>
                <div class="input-group">
                    <label for="password">Password:</label>
                    <input type="password" id="password" name="password" required>
                </div>
                <div class="input-group">
                    <button type="submit">Login</button>
                </div>
            </form>
        </div>
    </div>

    <footer class="footer" style="color: black;">
        <p>designed by Harish</p>
        <p>&copy; 2024 ABC Hospital. All rights reserved.</p>
    </footer>

    <!-- JavaScript for modal functionality -->
    <script>
        // Get modal and related elements
        var modal = document.getElementById("login-modal");
        var btn = document.getElementById("login-btn");
        var span = document.getElementsByClassName("close")[0];

        // Open the modal when the login link is clicked
        btn.onclick = function() {
            modal.style.display = "block";
        }

        // Close the modal when the close button (x) is clicked
        span.onclick = function() {
            modal.style.display = "none";
        }

        // Close the modal if the user clicks outside of it
        window.onclick = function(event) {
            if (event.target == modal) {
                modal.style.display = "none";
            }
        }
    </script>
    </body>
    </html>
